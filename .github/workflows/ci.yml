name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Type-check with mypy
        # Strict type checking is applied to the core and matching modules
        # we have audited. The remaining modules (legacy detector, FastAPI
        # web app, scanner, sources) are functional but pre-date the
        # project's typing standards; they are scheduled for incremental
        # typing in the project roadmap.
        run: mypy --ignore-missing-imports src/duplicate_monitor/core src/duplicate_monitor/matching/normalize.py src/duplicate_monitor/matching/scorer.py

      - name: Run unit tests
        run: pytest tests/unit --cov=duplicate_monitor --cov-report=term-missing
